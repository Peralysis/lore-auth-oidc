# Minimal lore-auth-oidc Compose example for Auth0.
#
# 1. Create the Regular Web Application as described in docs/providers/auth0.md.
# 2. Generate the secrets files (see the README "Run" section).
# 3. Replace the placeholder tenant domain and hostnames below (the issuer
#    keeps its trailing slash), then run:
#      docker compose -f docs/providers/compose/auth0.yml up --build
#
# The adapter listens in plaintext; production must terminate TLS and route
# gRPC and browser traffic on one hostname — see the root docker-compose.yml
# and Caddyfile for the full TLS-routing example.

services:
  adapter:
    build: ../../..
    environment:
      ADAPTER_PUBLIC_URL: https://auth.example.com
      OIDC_ISSUER_URL: https://TENANT_REGION.auth0.com/
      OIDC_CLIENT_ID: lore-auth-oidc
      OIDC_CLIENT_SECRET_FILE: /run/secrets/oidc-client-secret
      OIDC_PROVIDER_NAME: auth0
      # Auth0 commonly returns `nickname` and `email` rather than
      # `preferred_username`; pick the claim you want as the Lore username.
      OIDC_USERNAME_CLAIM: email
      JWT_AUDIENCE: lore.example.com
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt-private.pem
    secrets:
      - source: jwt-private-key
        target: jwt-private.pem
      - source: oidc-client-secret
        target: oidc-client-secret
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    expose:
      - "50051"
      - "8080"
    restart: unless-stopped

secrets:
  jwt-private-key:
    file: ../../../secrets/jwt-private.pem
  oidc-client-secret:
    file: ../../../secrets/oidc-client-secret
